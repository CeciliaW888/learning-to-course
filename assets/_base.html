  <!-- CUSTOMIZE: Override accent color palette
       Options: terracotta (default), coral, teal, amber, forest

       Terracotta: #c4825a / #b07149 / rgba(196,130,90,0.12) / rgba(196,130,90,0.06)
       Coral:      #D94F30 / #C4432A / rgba(217,79,48,0.12) / rgba(217,79,48,0.06)
       Teal:       #2A7B9B / #236A86 / rgba(42,123,155,0.12) / rgba(42,123,155,0.06)
       Amber:      #B8860B / #9E7309 / rgba(184,134,11,0.12) / rgba(184,134,11,0.06)
       Forest:     #4a7c59 / #3d6849 / rgba(74,124,89,0.12) / rgba(74,124,89,0.06)
  -->
  <style>
    :root {
      --color-accent: ACCENT_COLOR;
      --color-accent-hover: ACCENT_HOVER;
      --color-accent-light: ACCENT_LIGHT;
      --color-accent-muted: ACCENT_MUTED;
    }
  </style>

  <script src="main.js" defer></script>
</head>
